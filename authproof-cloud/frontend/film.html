<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authproof — A Story</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&family=Lora:ital,wght@1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #000;
      overflow: hidden;
      font-family: 'Inter', sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    #top-bar { width: 100vw; background: #000; flex-shrink: 0; }
    #bot-bar { width: 100vw; background: #000; flex-shrink: 0; }

    #cinema {
      position: relative;
      width: 100vw;
      height: calc(100vw / 2.35);
      overflow: hidden;
      background: #ffffff;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    @media (max-aspect-ratio: 2.35/1) {
      #cinema { width: calc(100vh * 2.35 * 0.7); height: calc(100vh * 0.7); }
    }

    /* Film grain — multiply blend, very low alpha on white */
    #grain {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 90;
      opacity: 0.02;
      mix-blend-mode: multiply;
    }

    /* Text container */
    #text-wrap {
      position: absolute; inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      padding: 0 10%;
    }

    #line {
      text-align: center;
      max-width: 70%;
      opacity: 0;
      /* no CSS transition — Web Animations API handles all opacity */
    }

    /* ── Font variants ── */
    #line.lora {
      font-family: 'Lora', Georgia, serif;
      font-style: italic;
      font-weight: 400;
      font-size: clamp(17px, 2.4vw, 32px);
      color: #1a1a1a;
      letter-spacing: 0em;
      line-height: 1.75;
    }

    #line.product {
      font-family: 'Inter', sans-serif;
      font-style: normal;
      font-weight: 300;
      font-size: clamp(15px, 2.1vw, 28px);
      color: #2a2a2a;
      letter-spacing: 0.01em;
      line-height: 1.75;
    }

    /* Brand moments: "Authproof Cloud." and "Math." */
    #line.brand {
      font-family: 'Inter', sans-serif;
      font-style: normal;
      font-weight: 700;
      font-size: clamp(22px, 3.5vw, 48px);
      color: #111;
      letter-spacing: -0.025em;
      line-height: 1.2;
    }

    /* ── Product reveal ── */
    #reveal {
      position: absolute; inset: 0;
      background: #ffffff;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      opacity: 0;
      z-index: 80;
    }

    .reveal-logo {
      font-family: 'Inter', sans-serif;
      font-size: clamp(22px, 3.2vw, 44px);
      font-weight: 700;
      color: #111;
      letter-spacing: -0.025em;
      opacity: 0;
    }
    .reveal-logo span { color: #1a56db; }

    .reveal-tagline {
      font-family: 'Inter', sans-serif;
      font-size: clamp(10px, 1.1vw, 14px);
      font-weight: 300;
      color: #555;
      letter-spacing: 0.04em;
      opacity: 0;
      text-align: center;
    }

    .reveal-url {
      font-family: 'Inter', sans-serif;
      font-size: clamp(12px, 1.4vw, 17px);
      font-weight: 600;
      color: #1a56db;
      letter-spacing: 0.01em;
      opacity: 0;
      margin-top: 10px;
    }

    .reveal-badges {
      display: flex;
      gap: 12px;
      margin-top: 12px;
      opacity: 0;
    }

    .badge {
      font-family: 'Inter', sans-serif;
      font-size: clamp(7px, 0.78vw, 10px);
      font-weight: 600;
      letter-spacing: 0.08em;
      color: #1a56db;
      border: 1.5px solid #1a56db;
      border-radius: 3px;
      padding: 4px 10px;
      text-transform: uppercase;
    }

    /* Replay button — dark on white */
    #replay {
      position: fixed; bottom: 18px; right: 22px;
      background: transparent;
      border: 1px solid rgba(0,0,0,0.2);
      color: rgba(0,0,0,0.4);
      font-family: 'Inter', sans-serif;
      font-size: 11px;
      letter-spacing: 0.08em;
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      display: none;
      z-index: 200;
      transition: all 0.2s;
    }
    #replay:hover { background: rgba(0,0,0,0.05); color: #111; }
  </style>
</head>
<body>

<div id="top-bar"></div>

<div id="cinema">
  <canvas id="grain"></canvas>

  <div id="text-wrap">
    <div id="line"></div>
  </div>

  <div id="reveal">
    <div class="reveal-logo"    id="r-logo">Authproof <span>Cloud</span></div>
    <div class="reveal-tagline" id="r-t1">Cryptographic authorization receipts for AI agents.</div>
    <div class="reveal-tagline" id="r-t2">HIPAA ready.&nbsp; Independently verifiable.</div>
    <div class="reveal-tagline" id="r-t3">Free to start.</div>
    <div class="reveal-url"     id="r-url">cloud.authproof.dev</div>
    <div class="reveal-badges"  id="r-badges">
      <div class="badge">HIPAA Ready</div>
      <div class="badge">SOC2 Ready</div>
      <div class="badge">EU AI Act Aligned</div>
    </div>
  </div>
</div>

<div id="bot-bar"></div>
<button id="replay">↺ &nbsp;REPLAY</button>

<script>
/* ── Film grain ─────────────────────────────── */
(function () {
  const c = document.getElementById('grain');
  const resize = () => {
    c.width  = Math.floor(c.offsetWidth  / 2);
    c.height = Math.floor(c.offsetHeight / 2);
  };
  resize();
  const ctx = c.getContext('2d');
  let f = 0;
  (function tick() {
    if (f++ % 2 === 0) {
      const id = ctx.createImageData(c.width, c.height);
      const d  = id.data;
      for (let i = 0; i < d.length; i += 4) {
        const v = Math.random() * 255 | 0;
        d[i] = d[i+1] = d[i+2] = v;
        d[i+3] = (Math.random() * 10) | 0;
      }
      ctx.putImageData(id, 0, 0);
    }
    requestAnimationFrame(tick);
  })();
  window.addEventListener('resize', resize);
})();

/* ── Letterbox ──────────────────────────────── */
function layout() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const ch = vw / 2.35;
  const barH = Math.max(0, (vh - ch) / 2);
  document.getElementById('top-bar').style.height = barH + 'px';
  document.getElementById('bot-bar').style.height = barH + 'px';
  const c = document.getElementById('cinema');
  c.style.width  = vw + 'px';
  c.style.height = ch + 'px';
}
layout();
window.addEventListener('resize', layout);

const $ = id => document.getElementById(id);

function fadeEl(el, from, to, dur, delay = 0) {
  return el.animate(
    [{ opacity: from }, { opacity: to }],
    { duration: dur, delay, fill: 'forwards', easing: 'ease-in-out' }
  );
}

/* ── Content cues ───────────────────────────── */
// [start_ms, end_ms, html, variant]
// variants: 'lora' | 'product' | 'brand'
const CUES = [
  [400,   4200,  'AI agents are making decisions about you.',                              'lora'],
  [4600,  8800,  'Scheduling appointments. Reviewing records.<br>Authorizing actions.',   'lora'],
  [9200,  13400, 'Do you know what they\'re allowed to do?',                              'lora'],
  // ~1.5s white silence: 13400–14900
  [14900, 18600, 'Authproof Cloud.',                                                      'brand'],
  [19000, 22700, 'Cryptographic receipts for every AI action.',                           'product'],
  [23100, 26800, 'Signed before the agent acts.',                                         'product'],
  [27200, 30900, 'Independently verifiable. Not the vendor\'s word.',                     'product'],
  [31300, 35500, 'Math.',                                                                 'brand'],
  [35900, 38900, 'HIPAA ready.',                                                          'product'],
  [39300, 43000, 'SOC2 compliant. EU AI Act aligned.',                                    'product'],
  [43400, 47000, 'Free to start. No credit card.',                                        'product'],
  // product reveal begins at 48500
];

const FADE = 700; // ms fade in / fade out
const lineEl = $('line');
let lastCueIdx = -1;

function updateCues(elapsed) {
  let active = -1;
  for (let i = 0; i < CUES.length; i++) {
    if (elapsed >= CUES[i][0] && elapsed < CUES[i][1]) { active = i; break; }
  }
  if (active === lastCueIdx) return;
  lastCueIdx = active;

  lineEl.getAnimations().forEach(a => a.cancel());

  if (active < 0) {
    lineEl.animate([{ opacity: parseFloat(getComputedStyle(lineEl).opacity) || 0 }, { opacity: 0 }],
      { duration: 500, fill: 'forwards', easing: 'ease-out' });
    return;
  }

  const [start, end, html, variant] = CUES[active];
  lineEl.className = variant;
  lineEl.innerHTML  = html;

  const remaining = Math.max(end - elapsed, 300);
  const fi = Math.min(FADE, remaining * 0.28);
  const fo = Math.min(FADE, remaining * 0.28);
  const holdEnd = Math.max((remaining - fo) / remaining, fi / remaining + 0.01);

  lineEl.animate(
    [
      { opacity: 0 },
      { opacity: 1,  offset: fi / remaining },
      { opacity: 1,  offset: holdEnd },
      { opacity: 0 },
    ],
    { duration: remaining, fill: 'forwards' }
  );
}

/* ── Product reveal ─────────────────────────── */
let revealStarted = false;
function updateReveal(elapsed) {
  if (elapsed < 48500 || revealStarted) return;
  revealStarted = true;

  lineEl.getAnimations().forEach(a => a.cancel());
  lineEl.style.opacity = '0';

  const rv = $('reveal');
  rv.style.display = 'flex';
  fadeEl(rv, 0, 1, 1000);

  const items = [
    { id: 'r-logo',   delay: 800  },
    { id: 'r-t1',     delay: 1700 },
    { id: 'r-t2',     delay: 2500 },
    { id: 'r-t3',     delay: 3100 },
    { id: 'r-url',    delay: 3900 },
    { id: 'r-badges', delay: 4900 },
  ];
  for (const { id, delay } of items) fadeEl($(id), 0, 1, 750, delay);
}

/* ── Replay ─────────────────────────────────── */
let endShown = false;
function updateEnd(elapsed) {
  if (elapsed < 58000 || endShown) return;
  endShown = true;
  const btn = $('replay');
  btn.style.display = 'block';
  btn.animate([{ opacity: 0 }, { opacity: 1 }], { duration: 500, fill: 'forwards' });
}

/* ── Main loop ──────────────────────────────── */
let startTs = null;
function tick(ts) {
  if (!startTs) startTs = ts;
  const e = ts - startTs;
  updateCues(e);
  updateReveal(e);
  updateEnd(e);
  if (e < 62000) requestAnimationFrame(tick);
}

/* ── Reset ──────────────────────────────────── */
function reset() {
  lastCueIdx    = -1;
  revealStarted = false;
  endShown      = false;
  startTs       = null;

  lineEl.getAnimations().forEach(a => a.cancel());
  lineEl.style.opacity = '0';
  lineEl.innerHTML     = '';

  const rv = $('reveal');
  rv.style.display = 'none';
  rv.style.opacity = '0';
  rv.getAnimations().forEach(a => a.cancel());
  ['r-logo','r-t1','r-t2','r-t3','r-url','r-badges'].forEach(id => {
    const el = $(id);
    el.style.opacity = '0';
    el.getAnimations().forEach(a => a.cancel());
  });

  $('cinema').style.background = '#ffffff';
  $('replay').style.display = 'none';
  requestAnimationFrame(tick);
}

$('replay').addEventListener('click', reset);
requestAnimationFrame(tick);
</script>

</body>
</html>
