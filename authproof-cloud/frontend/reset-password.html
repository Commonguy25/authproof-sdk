<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — Authproof Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; border-radius: 0 !important; }

    :root {
      --bg:    #000000;
      --bg2:   #0a0a0a;
      --bg3:   #111111;
      --border: #222;
      --green: #00FF41;
      --text:  #d4d4d4;
      --muted: #666;
      --white: #ffffff;
      --red:   #ff4444;
      --mono:  'JetBrains Mono', 'Courier New', monospace;
      --sans:  'Inter', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 48px;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: var(--mono);
      color: var(--green);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
    }
    nav a.back {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 12px;
      text-decoration: none;
      letter-spacing: 0.04em;
      transition: color 0.15s;
    }
    nav a.back:hover { color: var(--green); }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 64px 24px;
    }

    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      padding: 44px 44px 40px;
      width: 100%;
      max-width: 420px;
    }

    .card-title {
      font-family: var(--sans);
      font-size: 22px;
      font-weight: 700;
      color: var(--white);
      margin-bottom: 6px;
      letter-spacing: -0.02em;
    }
    .card-sub {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-family: var(--mono);
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    input {
      display: block;
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      padding: 11px 14px;
      color: var(--white);
      font-family: var(--mono);
      font-size: 13px;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 20px;
    }
    input:focus { border-color: var(--green); }
    input::placeholder { color: var(--muted); }

    .btn {
      display: block;
      width: 100%;
      background: var(--green);
      color: #000;
      padding: 13px;
      font-family: var(--mono);
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.05em;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
      margin-top: 8px;
    }
    .btn:hover { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .error-box {
      background: rgba(255, 68, 68, 0.08);
      border: 1px solid rgba(255, 68, 68, 0.3);
      padding: 12px 16px;
      color: var(--red);
      font-family: var(--mono);
      font-size: 12px;
      margin-bottom: 20px;
      display: none;
    }

    .spinner {
      display: inline-block;
      width: 13px;
      height: 13px;
      border: 2px solid #000;
      border-top-color: transparent;
      border-radius: 50% !important;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .invalid-state {
      text-align: center;
      padding: 24px 0;
    }
    .invalid-state p {
      font-family: var(--mono);
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 20px;
    }
    .invalid-state a {
      color: var(--green);
      font-family: var(--mono);
      font-size: 13px;
      text-decoration: none;
    }
    .invalid-state a:hover { text-decoration: underline; }

    @media (max-width: 640px) {
      nav { padding: 16px 20px; }
      main { padding: 32px 16px; }
      .card { padding: 28px 20px 24px; }
      .card-title { font-size: 19px; }
    }
  </style>
</head>
<body>

<nav>
  <a class="logo" href="/">Authproof Cloud</a>
  <a class="back" href="/login">← Log in</a>
</nav>

<main>
  <div class="card">
    <div class="card-title">Set new password</div>
    <p class="card-sub">Choose a new password for your account.</p>

    <div class="error-box" id="errorBox"></div>

    <div id="formContainer">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" minlength="8" autocomplete="new-password" />

      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password" minlength="8" autocomplete="new-password" />

      <button class="btn" id="submitBtn" onclick="handleReset()">Update password</button>
    </div>

    <div class="invalid-state" id="invalidState" style="display:none">
      <p>This reset link is invalid or has expired.</p>
      <a href="/login">← Back to log in</a>
    </div>
  </div>
</main>

<script>
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    document.getElementById('formContainer').style.display = 'none';
    document.getElementById('invalidState').style.display  = 'block';
  }

  async function handleReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const btn      = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');

    errorBox.style.display = 'none';

    if (password.length < 8) {
      errorBox.textContent = 'Password must be at least 8 characters.';
      errorBox.style.display = 'block';
      return;
    }
    if (password !== confirm) {
      errorBox.textContent = 'Passwords do not match.';
      errorBox.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Updating\u2026';

    try {
      const res = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        errorBox.textContent = data.error || 'Failed to update password.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Update password';
        return;
      }

      window.location.href = '/login?reset=true';

    } catch {
      errorBox.textContent = 'Something went wrong. Please try again.';
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Update password';
    }
  }
</script>

<footer style="border-top:1px solid #222;padding:20px 48px;display:flex;gap:24px;align-items:center;flex-wrap:wrap">
  <a href="/support" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#666;text-decoration:none" onmouseover="this.style.color='#00FF41'" onmouseout="this.style.color='#666'">Support</a>
  <a href="/baa" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#666;text-decoration:none" onmouseover="this.style.color='#00FF41'" onmouseout="this.style.color='#666'">BAA</a>
  <a href="/terms" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#666;text-decoration:none" onmouseover="this.style.color='#00FF41'" onmouseout="this.style.color='#666'">Terms of Service</a>
  <a href="/privacy" style="font-family:'JetBrains Mono',monospace;font-size:12px;color:#666;text-decoration:none" onmouseover="this.style.color='#00FF41'" onmouseout="this.style.color='#666'">Privacy Policy</a>
  <span style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#333;margin-left:auto">Built on cryptographic proof, not operator trust.</span>
</footer>

</body>
</html>
