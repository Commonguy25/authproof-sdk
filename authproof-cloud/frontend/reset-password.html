<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset password — Authproof Cloud</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:     #1a56db;
      --blue-lt:  #e8f0fe;
      --blue-dk:  #1340a8;
      --gray-200: #e5e7eb;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-700: #374151;
      --gray-900: #111111;
      --red:      #dc2626;
      --red-lt:   #fef2f2;
      --red-bd:   #fecaca;
      --white:    #ffffff;
      --sans:     'Inter', sans-serif;
    }

    body {
      background: #f8f9fa;
      color: var(--gray-700);
      font-family: var(--sans);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      -webkit-font-smoothing: antialiased;
    }
    a { color: inherit; text-decoration: none; }

    nav {
      background: var(--white);
      border-bottom: 1px solid var(--gray-200);
      padding: 0 48px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .nav-logo { font-size: 17px; font-weight: 700; color: var(--gray-900); }
    .nav-logo span { color: var(--blue); }
    .nav-back { font-size: 14px; font-weight: 500; color: var(--gray-500); transition: color 0.15s; }
    .nav-back:hover { color: var(--gray-900); }

    main { flex: 1; display: flex; align-items: center; justify-content: center; padding: 48px 24px; }

    .card {
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 8px;
      padding: 40px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .card-eyebrow { font-size: 12px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--blue); margin-bottom: 8px; }
    .card-title { font-size: 24px; font-weight: 700; color: var(--gray-900); letter-spacing: -0.02em; margin-bottom: 6px; }
    .card-sub { font-size: 14px; color: var(--gray-500); margin-bottom: 28px; }

    label { display: block; font-size: 13px; font-weight: 600; color: var(--gray-700); margin-bottom: 6px; }
    input {
      display: block; width: 100%; background: var(--white);
      border: 1px solid var(--gray-200); border-radius: 4px;
      padding: 10px 14px; font-family: var(--sans); font-size: 14px;
      color: var(--gray-900); outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      margin-bottom: 18px;
    }
    input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(26,86,219,0.1); }
    input::placeholder { color: var(--gray-400); }

    .btn {
      display: block; width: 100%;
      background: var(--blue); color: var(--white);
      padding: 11px 20px; font-family: var(--sans); font-size: 15px; font-weight: 600;
      border: 2px solid var(--blue); border-radius: 4px;
      cursor: pointer; transition: background 0.15s, border-color 0.15s;
      margin-top: 4px; text-align: center;
    }
    .btn:hover { background: var(--blue-dk); border-color: var(--blue-dk); }
    .btn:disabled { opacity: 0.55; cursor: not-allowed; }

    .error-box {
      background: var(--red-lt); border: 1px solid var(--red-bd); border-radius: 4px;
      padding: 11px 14px; color: var(--red); font-size: 13px;
      margin-bottom: 18px; display: none;
    }

    .invalid-state { text-align: center; padding: 16px 0; }
    .invalid-state p { font-size: 15px; color: var(--gray-500); margin-bottom: 20px; }
    .invalid-state a { color: var(--blue); font-weight: 600; font-size: 14px; }
    .invalid-state a:hover { text-decoration: underline; }

    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    footer { background: var(--white); border-top: 1px solid var(--gray-200); padding: 20px 48px; display: flex; gap: 24px; align-items: center; flex-wrap: wrap; }
    footer a { font-size: 13px; color: var(--gray-500); transition: color 0.15s; }
    footer a:hover { color: var(--gray-900); }
    .footer-tagline { margin-left: auto; font-size: 12px; color: var(--gray-400); }

    @media (max-width: 640px) {
      nav { padding: 0 20px; }
      main { padding: 32px 16px; align-items: flex-start; padding-top: 40px; }
      .card { padding: 28px 24px; }
      footer { padding: 16px 20px; }
      .footer-tagline { display: none; }
    }
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="/">Authproof <span>Cloud</span></a>
  <a class="nav-back" href="/login">← Back to log in</a>
</nav>

<main>
  <div class="card">
    <div class="card-eyebrow">Account security</div>
    <h1 class="card-title">Set new password</h1>
    <p class="card-sub">Choose a strong password for your account.</p>

    <div class="error-box" id="errorBox"></div>

    <div id="formContainer">
      <label for="password">New password</label>
      <input type="password" id="password" placeholder="Min. 8 characters" minlength="8" autocomplete="new-password" />

      <label for="confirmPassword">Confirm password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat your password" minlength="8" autocomplete="new-password" />

      <button class="btn" id="submitBtn" onclick="handleReset()">Update password</button>
    </div>

    <div class="invalid-state" id="invalidState" style="display:none">
      <p>This reset link is invalid or has expired.</p>
      <a href="/login">← Back to log in</a>
    </div>
  </div>
</main>

<footer>
  <a href="/support">Support</a>
  <a href="/baa">BAA</a>
  <a href="/terms">Terms of Service</a>
  <a href="/privacy">Privacy Policy</a>
  <span class="footer-tagline">Built on cryptographic proof, not operator trust.</span>
</footer>

<script>
  const token = new URLSearchParams(window.location.search).get('token');

  if (!token) {
    document.getElementById('formContainer').style.display = 'none';
    document.getElementById('invalidState').style.display  = 'block';
  }

  async function handleReset() {
    const password = document.getElementById('password').value;
    const confirm  = document.getElementById('confirmPassword').value;
    const btn      = document.getElementById('submitBtn');
    const errorBox = document.getElementById('errorBox');

    errorBox.style.display = 'none';

    if (password.length < 8) {
      errorBox.textContent = 'Password must be at least 8 characters.';
      errorBox.style.display = 'block';
      return;
    }
    if (password !== confirm) {
      errorBox.textContent = 'Passwords do not match.';
      errorBox.style.display = 'block';
      return;
    }

    btn.disabled = true;
    btn.innerHTML = '<span class="spinner"></span>Updating\u2026';

    try {
      const res = await fetch('/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password }),
      });
      const data = await res.json();
      if (!res.ok) {
        errorBox.textContent = data.error || 'Failed to update password.';
        errorBox.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Update password';
        return;
      }
      window.location.href = '/login?reset=true';
    } catch {
      errorBox.textContent = 'Something went wrong. Please try again.';
      errorBox.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Update password';
    }
  }
</script>

</body>
</html>
